# docker-compose.dev-tools.yml — Developer tools override (local dev only)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev-tools.yml up
#
# WARNING: Never use this file in staging or production.
# pgAdmin exposes a management UI and must not be reachable from the internet.

services:
  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - canopy_internal

networks:
  canopy_internal:
    driver: bridge

volumes:
  pgadmin_data:
