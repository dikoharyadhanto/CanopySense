services:
  postgis:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: canopysense_test
      POSTGRES_USER: patcher
      POSTGRES_PASSWORD: patcher_test
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "patcher", "-d", "canopysense_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  patcher:
    build:
      context: ..
      dockerfile: 04_Test/Dockerfile.patcher
    depends_on:
      postgis:
        condition: service_healthy
    env_file:
      - .env.test
    environment:
      PGHOST: postgis
      PGPORT: 5432
      PGDATABASE: canopysense_test
      PGUSER: patcher
      PGPASSWORD: patcher_test
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["python3", "patcher_local.py"]
